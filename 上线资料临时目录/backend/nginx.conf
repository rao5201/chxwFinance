# 茶海虾王@金融交易所看板平台 - Nginx配置

upstream tea_sea_shrimp_king {
    server localhost:8080;
    # 可以添加多个服务器进行负载均衡
    # server localhost:8081;
    # server localhost:8082;
}

server {
    listen 80;
    server_name www.tea-sea-shrimp-king.com tea-sea-shrimp-king.com;
    
    # 重定向到HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.tea-sea-shrimp-king.com tea-sea-shrimp-king.com;
    
    # SSL配置
    ssl_certificate /etc/nginx/ssl/tea-sea-shrimp-king.com.crt;
    ssl_certificate_key /etc/nginx/ssl/tea-sea-shrimp-king.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 安全头部
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https:; frame-src 'none'; object-src 'none'" always;
    
    # 访问日志
    access_log /var/log/nginx/tea-sea-shrimp-king.access.log;
    error_log /var/log/nginx/tea-sea-shrimp-king.error.log;
    
    # 静态文件
    location / {
        root /var/www/tea-sea-shrimp-king;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # API代理
    location /api/ {
        proxy_pass http://tea_sea_shrimp_king/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-SSL on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # 健康检查
    location /health {
        proxy_pass http://tea_sea_shrimp_king/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 404处理
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/tea-sea-shrimp-king;
        internal;
    }
    
    # 500处理
    error_page 500 502 503 504 /500.html;
    location = /500.html {
        root /var/www/tea-sea-shrimp-king;
        internal;
    }
}
