# 茶海虾王@金融交易所看板平台 - Grafana配置

[paths]
data = /var/lib/grafana
tmp_data_lifetime = 24h
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[server]
http_addr = 0.0.0.0
http_port = 3000
enforce_domain = false
root_url = %(protocol)s://%(domain)s:%(http_port)s/grafana

[database]
type = sqlite3

[security]
admin_user = admin
admin_password = admin

[auth.anonymous]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false

[dashboards]
default_home_dashboard_path = /etc/grafana/dashboards/home.json

[users]
allow_sign_up = false

[smtp]
enabled = false

[log]
mode = console
level = info

[alerting]
enabled = true

[metrics]
enabled = true

[panels]
enable_alpha = false

[rendering]
enabled = true

[insights]
enabled = false
