
# MongoDB配置文件 - 茶海虾王金融交易所

# 数据存储路径
storage:
  dbPath: /data/mongodb
  journal:
    enabled: true
  engine: wiredTiger
  wiredTiger:
    engineConfig:
      cacheSizeGB: 2

# 日志配置
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log
  logRotate: reopen

# 网络配置
net:
  port: 27017
  bindIp: 127.0.0.1
  maxIncomingConnections: 1000

# 进程管理
processManagement:
  timeZoneInfo: /usr/share/zoneinfo
  pidFilePath: /var/run/mongodb/mongod.pid

# 安全配置
security:
  authorization: enabled
  javascriptEnabled: false

# 性能优化
operationProfiling:
  slowOpThresholdMs: 100
  mode: slowOp

# 复制集配置（可选）
# replication:
#   replSetName: rs0

# 分片配置（可选）
# sharding:
#   clusterRole: shardsvr
