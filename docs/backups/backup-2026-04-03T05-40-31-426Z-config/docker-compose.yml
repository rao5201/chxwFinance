version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:7.0
    container_name: chxw-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Admin123!
      MONGO_INITDB_DATABASE: chxw_finance
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - chxw-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7.2-alpine
    container_name: chxw-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass Redis123!
    volumes:
      - redis_data:/data
    networks:
      - chxw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chxw-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/chxw_finance?authSource=admin
      REDIS_URL: redis://:Redis123!@redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRE: 7d
      JWT_REFRESH_EXPIRE: 30d
      CORS_ORIGIN: http://localhost:8080,https://yourdomain.com
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chxw-network
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups

  # 前端服务（Nginx）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chxw-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - chxw-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: chxw-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - chxw-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  chxw-network:
    driver: bridge
