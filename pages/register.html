<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 茶海虾王@金融交易所看板平台</title>
    <meta name="description" content="注册茶海虾王金融交易所账号，免费体验AI智能分析、实时行情、技术指标等专业金融交易工具">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-gradient:hover {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center space-x-2">
                    <i class="fas fa-chart-line text-2xl text-indigo-600"></i>
                    <span class="text-xl font-bold gradient-text">茶海虾王</span>
                </a>
                
                <div class="flex items-center space-x-4">
                    <a href="/register-en.html" class="text-gray-600 hover:text-indigo-600 transition">English</a>
                    <span class="text-gray-600">已有账号？</span>
                    <a href="/login.html" class="text-indigo-600 hover:text-indigo-700 font-semibold transition">
                        立即登录
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">创建账号</h1>
                    <p class="text-gray-600">注册即可免费体验所有功能</p>
                </div>
                
                <form id="registerForm" class="space-y-6">
                    <!-- 用户名 -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                            用户名 <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-400"></i>
                            </div>
                            <input type="text" id="username" name="username" required
                                   class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                   placeholder="请输入用户名">
                        </div>
                    </div>
                    
                    <!-- 邮箱 -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            邮箱地址 <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-gray-400"></i>
                            </div>
                            <input type="email" id="email" name="email" required
                                   class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                   placeholder="请输入邮箱地址">
                        </div>
                        <p class="mt-1 text-xs text-gray-500">
                            <i class="fas fa-info-circle mr-1"></i>
                            推荐使用 <a href="#email" class="text-indigo-600 hover:underline">Cloudflare免费邮箱</a>
                        </p>
                    </div>
                    
                    <!-- 手机号码 -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                            手机号码 <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-phone text-gray-400"></i>
                            </div>
                            <input type="tel" id="phone" name="phone" required
                                   class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                   placeholder="请输入手机号码">
                        </div>
                    </div>
                    
                    <!-- 密码 -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            密码 <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="password" name="password" required
                                   class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                   placeholder="请输入密码（至少8位）">
                            <button type="button" onclick="togglePassword('password')" 
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 确认密码 -->
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
                            确认密码 <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="confirmPassword" name="confirmPassword" required
                                   class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                   placeholder="请再次输入密码">
                            <button type="button" onclick="togglePassword('confirmPassword')" 
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 验证码 -->
                    <div>
                        <label for="verificationCode" class="block text-sm font-medium text-gray-700 mb-2">
                            验证码 <span class="text-red-500">*</span>
                        </label>
                        <div class="flex gap-3">
                            <div class="relative flex-grow">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-shield-alt text-gray-400"></i>
                                </div>
                                <input type="text" id="verificationCode" name="verificationCode" required
                                       class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                       placeholder="请输入验证码">
                            </div>
                            <button type="button" id="sendCodeBtn" onclick="sendVerificationCode()"
                                    class="px-6 py-3 bg-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-200 transition font-semibold whitespace-nowrap">
                                发送验证码
                            </button>
                        </div>
                    </div>
                    
                    <!-- 用户协议 -->
                    <div class="flex items-start">
                        <input type="checkbox" id="agreement" name="agreement" required
                               class="mt-1 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="agreement" class="ml-2 block text-sm text-gray-700">
                            我已阅读并同意
                            <a href="/terms.html" class="text-indigo-600 hover:underline">《用户协议》</a>
                            和
                            <a href="/privacy.html" class="text-indigo-600 hover:underline">《隐私政策》</a>
                        </label>
                    </div>
                    
                    <!-- 注册按钮 -->
                    <button type="submit" 
                            class="w-full btn-gradient text-white py-3 rounded-lg font-semibold hover:shadow-lg transition flex items-center justify-center gap-2">
                        <i class="fas fa-user-plus"></i>
                        立即注册
                    </button>
                </form>
                
                <!-- 分隔线 -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">或使用以下方式注册</span>
                    </div>
                </div>
                
                <!-- 第三方登录 -->
                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-2 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        <i class="fab fa-weixin text-green-500 text-xl"></i>
                        <span class="text-gray-700">微信</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        <i class="fab fa-qq text-blue-500 text-xl"></i>
                        <span class="text-gray-700">QQ</span>
                    </button>
                </div>
            </div>
            
            <!-- 提示信息 -->
            <div class="mt-6 text-center text-sm text-gray-600">
                <p>
                    <i class="fas fa-info-circle mr-1"></i>
                    注册即表示您同意接收我们的产品更新和促销信息
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600 text-sm">
            <p>&copy; 2026 茶海虾王@金融交易所看板平台. All rights reserved.</p>
        </div>
    </footer>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-3xl text-green-600"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-900 mb-2">注册成功！</h3>
            <p class="text-gray-600 mb-6">您的账号已创建成功，请查收验证邮件</p>
            <a href="/login.html" class="inline-block btn-gradient text-white px-8 py-3 rounded-lg font-semibold hover:shadow-lg transition">
                立即登录
            </a>
        </div>
    </div>

    <script>
        // 切换密码显示
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // 发送验证码
        let countdown = 60;
        function sendVerificationCode() {
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            
            if (!phone && !email) {
                alert('请先填写手机号码或邮箱地址');
                return;
            }
            
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.classList.remove('bg-indigo-100', 'text-indigo-600');
            btn.classList.add('bg-gray-100', 'text-gray-400');
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重试`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                    btn.classList.remove('bg-gray-100', 'text-gray-400');
                    btn.classList.add('bg-indigo-100', 'text-indigo-600');
                    countdown = 60;
                }
            }, 1000);
            
            // 模拟发送验证码
            alert('验证码已发送，请查收');
        }
        
        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            if (password.length < 8) {
                alert('密码长度至少为8位');
                return;
            }
            
            // 显示成功模态框
            document.getElementById('successModal').classList.remove('hidden');
            document.getElementById('successModal').classList.add('flex');
        });
        
        // 点击模态框外部关闭
        document.getElementById('successModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
                this.classList.remove('flex');
            }
        });
    </script>
</body>
</html>
