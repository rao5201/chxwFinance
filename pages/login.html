<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 茶海虾王@金融交易所看板平台</title>
    <meta name="description" content="登录茶海虾王金融交易所账号，体验AI智能分析、实时行情、技术指标等专业金融交易工具">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-gradient:hover {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="../index.html" class="flex items-center space-x-2">
                    <i class="fas fa-chart-line text-2xl text-indigo-600"></i>
                    <span class="text-xl font-bold gradient-text">茶海虾王</span>
                </a>
                
                <div class="flex items-center space-x-4">
                    <a href="login-en.html" class="text-gray-600 hover:text-indigo-600 transition">English</a>
                    <span class="text-gray-600">还没有账号？</span>
                    <a href="register.html" class="text-indigo-600 hover:text-indigo-700 font-semibold transition">
                        立即注册
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">欢迎回来</h1>
                    <p class="text-gray-600">登录您的账号继续使用</p>
                </div>
                
                <form id="loginForm" class="space-y-6">
                    <!-- 邮箱/用户名 -->
                    <div>
                        <label for="account" class="block text-sm font-medium text-gray-700 mb-2">
                            邮箱/用户名 <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-400"></i>
                            </div>
                            <input type="text" id="account" name="account" required
                                   class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                   placeholder="请输入邮箱或用户名">
                        </div>
                    </div>
                    
                    <!-- 密码 -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            密码 <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="password" name="password" required
                                   class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition"
                                   placeholder="请输入密码">
                            <button type="button" onclick="togglePassword('password')" 
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 记住我 & 忘记密码 -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input type="checkbox" id="remember" name="remember"
                                   class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                            <label for="remember" class="ml-2 block text-sm text-gray-700">
                                记住我
                            </label>
                        </div>
                        
                        <a href="/forgot-password.html" class="text-sm text-indigo-600 hover:text-indigo-700">
                            忘记密码？
                        </a>
                    </div>
                    
                    <!-- 登录按钮 -->
                    <button type="submit" 
                            class="w-full btn-gradient text-white py-3 rounded-lg font-semibold hover:shadow-lg transition flex items-center justify-center gap-2">
                        <i class="fas fa-sign-in-alt"></i>
                        立即登录
                    </button>
                </form>
                
                <!-- 分隔线 -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">或使用以下方式登录</span>
                    </div>
                </div>
                
                <!-- 第三方登录 -->
                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-2 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        <i class="fab fa-weixin text-green-500 text-xl"></i>
                        <span class="text-gray-700">微信</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        <i class="fab fa-qq text-blue-500 text-xl"></i>
                        <span class="text-gray-700">QQ</span>
                    </button>
                </div>
            </div>
            
            <!-- 提示信息 -->
            <div class="mt-6 text-center text-sm text-gray-600">
                <p>
                    <i class="fas fa-shield-alt mr-1"></i>
                    登录即表示您同意我们的
                    <a href="/terms.html" class="text-indigo-600 hover:underline">用户协议</a>
                    和
                    <a href="/privacy.html" class="text-indigo-600 hover:underline">隐私政策</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600 text-sm">
            <p>&copy; 2026 茶海虾王@金融交易所看板平台. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 切换密码显示
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 模拟登录成功
            alert('登录成功！即将跳转到首页...');
            window.location.href = '/';
        });
    </script>
</body>
</html>
