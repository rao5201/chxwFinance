# 茶海虾王@金融交易所看板平台 - Prometheus配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # 监控Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  # 监控应用服务
  - job_name: 'tea-sea-shrimp-king'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080']

  # 监控Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']

  # 监控MongoDB
  - job_name: 'mongodb'
    static_configs:
      - targets: ['localhost:9216']
